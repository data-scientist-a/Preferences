<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chestionar Elegant</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #f3f4f6;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.05);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #10b981;
    }
    .question {
      margin-bottom: 35px;
    }
    .question h3 {
      margin-bottom: 15px;
      color: #8b5cf6;
    }
    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .option {
      flex: 1 1 40%;
      padding: 16px;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .option:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-3px);
    }
    .option.selected {
      background: #10b981;
      color: #fff;
      font-weight: bold;
    }
    button {
      display: block;
      margin: 40px auto 0;
      padding: 14px 28px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #10b981;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #059669;
    }
    .result {
      margin-top: 30px;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      text-align: center;
      font-size: 18px;
      color: #f3f4f6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Chestionar Personal</h1>
    <form id="quizForm">
      <!-- Exemplu întrebare -->
      <div class="question">
        <h3>1. Care este vârsta ta?</h3>
        <div class="options">
          <div class="option" data-value="0-10">0-10</div>
          <div class="option" data-value="10-20">10-20</div>
          <div class="option" data-value="20-30">20-30</div>
          <div class="option" data-value="30-40">30-40</div>
          <div class="option" data-value="40+">40+</div>
        </div>
      </div>
      <!-- Adaugă aici restul întrebărilor exact cum ți-am arătat -->
      <button type="submit">Trimite</button>
    </form>
    <div id="result" class="result" style="display:none;"></div>
  </div>

  <script>
    // Marchează selecția
    document.querySelectorAll('.options').forEach(group => {
      group.querySelectorAll('.option').forEach(opt => {
        opt.addEventListener('click', () => {
          group.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
        });
      });
    });

    // Colectează răspunsurile și afișează un mic profil
    document.getElementById('quizForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const answers = {};
      document.querySelectorAll('.question').forEach(q => {
        const selected = q.querySelector('.option.selected');
        if (selected) {
          const key = q.querySelector('h3').innerText;
          answers[key] = selected.dataset.value;
        }
      });

      let rezultat = "Profilul tău: ";
      if (answers["1. Care este vârsta ta?"] === "10-20") rezultat += "tânăr și plin de energie. ";
      if (answers["1. Care este vârsta ta?"] === "40+") rezultat += "matur și experimentat. ";
      if (answers["4. Ce parte a zilei preferi?"] === "Noaptea") rezultat += "creativ și visător. ";
      if (answers["6. Care este locul tău preferat de vacanță?"] === "Mare") rezultat += "iubești libertatea și relaxarea.";

      document.getElementById('result').style.display = "block";
      document.getElementById('result').innerText = rezultat;
    });
  </script>
</body>
</html>
